name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      LEDRIVER_WIFI_SSID: ci-dummy-ssid
      LEDRIVER_WIFI_PASSWORD: ci-dummy-password
      LEDRIVER_UPDATE_BASE_URL: https://example.com/ci-dummy-firmware/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: webpanel/package-lock.json

      - name: Install ESP-IDF
        uses: espressif/install-esp-idf-action@v1
        with:
          version: v6.0.1

      - name: Generate factory NVS
        run: |
          ./tools/generate_factory_nvs.sh

      - name: Build firmware
        run: |
          idf.py set-target esp32
          idf.py build
